name: CI
on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
      - feature/**
  workflow_dispatch: {}
jobs:
  backend-tests:
    name: backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw test

  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/frontend
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    needs:
      - backend-tests
      - frontend-build
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: build backend docker image
        run: docker build -t prtfolio-backend:ci ./apps/backend

      - name: build frontend docker image
        run: docker build -t prtfolio-frontend:ci ./apps/frontend
  
  docker-push:
    needs: docker-build
    name: docker push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push backend
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/portfolio-backend:${{ github.sha }} \
            ./apps/backend

          docker push \
            ghcr.io/${{ github.repository_owner }}/portfolio-backend:${{ github.sha }}

      - name: build and push frontend
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/portfolio-frontend:${{ github.sha }} \
            ./apps/frontend

          docker push \
            ghcr.io/${{ github.repository_owner }}/portfolio-frontend:${{ github.sha }}