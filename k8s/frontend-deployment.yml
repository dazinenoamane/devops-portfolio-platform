apiVersion: v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: portfolio-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/dazinenoamane/portfolio-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet: 
              path: /
              port: 80